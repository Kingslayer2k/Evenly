<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Rounded square background -->
  <rect width="48" height="48" rx="13" fill="#2A3E32"/>
  <!-- Subtle inner gradient overlay -->
  <rect width="48" height="48" rx="13" fill="url(#g1)" opacity="0.35"/>
  <!-- Three perfectly equal bars -->
  <rect x="10" y="14.5" width="28" height="3.5" rx="1.75" fill="#E1F9D8"/>
  <rect x="10" y="22.25" width="28" height="3.5" rx="1.75" fill="#E1F9D8"/>
  <rect x="10" y="30" width="28" height="3.5" rx="1.75" fill="#E1F9D8"/>
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="black"/>
    </linearGradient>
  </defs>
</svg>
